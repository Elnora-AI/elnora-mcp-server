name: Bug Report
description: Report a bug with the Elnora MCP Server
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: MCP Server Version
      description: Which version of the Elnora MCP Server are you using?
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: client
    attributes:
      label: MCP Client
      description: Which MCP client are you using?
      options:
        - Claude Code
        - Codex
        - Cursor
        - VS Code (Copilot)
        - ChatGPT
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the bug.
      placeholder: |
        1. Connect to Elnora MCP server
        2. Call tool X with parameters Y
        3. See error Z
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Any relevant error messages or logs.
        **Important:** Please redact any API keys, tokens, or personal data before pasting.
      render: shell
    validations:
      required: false
