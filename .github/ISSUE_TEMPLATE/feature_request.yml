name: Feature Request
description: Suggest a new tool or capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: input
    id: tool
    attributes:
      label: What tool or capability?
      description: Name the tool or area of functionality this relates to.
      placeholder: "e.g., elnora_search_protocols, file sharing, project management"
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: Describe what you're trying to accomplish. What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: Describe how the feature would work from your perspective as a user.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you tried any workarounds or alternative approaches?
    validations:
      required: false
