name: "Elnora MCP Server CodeQL Config"

# Use the default queries plus security-extended
queries:
  - uses: security-extended

# Paths to exclude from analysis (none — we want full coverage)
# paths-ignore: []

# Suppress specific false positives
query-filters:
  # hashKey() in redis-token-store.ts uses SHA-256 to derive Redis key identifiers
  # from cryptographically random tokens (crypto.randomBytes(32)), not to hash passwords.
  # 256 bits of entropy makes brute-force infeasible regardless of hash algorithm.
  - exclude:
      id: js/insufficient-password-hash
      path: src/auth/redis-token-store.ts
