name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ECR_REGISTRY: 551507900153.dkr.ecr.us-east-1.amazonaws.com
  AWS_CLUSTER: production
  AWS_ROLE_ARN: arn:aws:iam::551507900153:role/elnora-github-actions-deploy

jobs:
  deploy:
    name: Deploy MCP Server
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
      EVENT_NAME: ${{ github.event_name }}
    steps:
      - uses: actions/checkout@v6
      - name: Guard manual dispatch to main branch
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main'
        run: |
          echo "::error::Manual deploy is only allowed from the main branch"
          exit 1
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - uses: aws-actions/amazon-ecr-login@v2
      - name: Resolve image tag
        id: tag
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            echo "version=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi
      - name: Validate image tag
        run: |
          if [ -z "${{ steps.tag.outputs.version }}" ]; then
            echo "::error::Image tag is empty — aborting deploy"
            exit 1
          fi
      - name: Build and push Docker image
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.version }}
        run: |
          IMAGE="$AWS_ECR_REGISTRY/elnora-mcp-server"
          docker build -t "$IMAGE:$IMAGE_TAG" .
          docker push "$IMAGE:$IMAGE_TAG"
          if [ "$EVENT_NAME" = "release" ]; then
            docker tag "$IMAGE:$IMAGE_TAG" "$IMAGE:latest"
            docker push "$IMAGE:latest"
          fi
      - name: Update ECS service
        run: |
          export AWS_PAGER=""
          aws ecs update-service \
            --cluster "$AWS_CLUSTER" \
            --service mcp-server \
            --force-new-deployment \
            --region "$AWS_REGION"
      - name: Wait for stabilization
        run: |
          aws ecs wait services-stable \
            --cluster "$AWS_CLUSTER" \
            --services mcp-server \
            --region "$AWS_REGION"
