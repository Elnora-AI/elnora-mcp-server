name: Auto-Fix Vulnerabilities

on:
  schedule:
    # Run every 4 hours. There is no native Actions trigger for Dependabot
    # alerts (dependabot_alert is webhook-only), so we poll instead.
    # Adjust frequency based on observed Actions minutes usage.
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — analyze only, do not create PR'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: vuln-autofix
  cancel-in-progress: false

jobs:
  detect-and-fix:
    name: Detect & Fix Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Fetch Dependabot alerts and create tracking issues
        id: alerts
        uses: actions/github-script@v8
        env:
          DEPENDABOT_TOKEN: ${{ secrets.DEPENDABOT_PAT }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // ── Fetch open Dependabot alerts ──
            const alertsResponse = await fetch(
              `https://api.github.com/repos/${context.repo.owner}/${context.repo.repo}/dependabot/alerts?state=open&per_page=100`,
              {
                headers: {
                  'Authorization': `Bearer ${process.env.DEPENDABOT_TOKEN}`,
                  'Accept': 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28'
                }
              }
            );

            if (!alertsResponse.ok) {
              throw new Error(`Failed to fetch alerts: ${alertsResponse.status}`);
            }

            const alerts = await alertsResponse.json();
            console.log(`Found ${alerts.length} open Dependabot alerts`);

            if (alerts.length === 0) {
              core.setOutput('has_alerts', 'false');
              return;
            }

            // ── Get existing issues to avoid duplicates ──
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'Source: Vulnerability Scan',
              state: 'all',
              per_page: 100
            });

            const existingIds = existingIssues.map(issue => {
              const cve = issue.title.match(/CVE-\d{4}-\d+/);
              const ghsa = issue.title.match(/GHSA-[a-z0-9]{4}-[a-z0-9]{4}-[a-z0-9]{4}/);
              return cve ? cve[0] : (ghsa ? ghsa[0] : null);
            }).filter(Boolean);

            // ── Create issues for new alerts + build summary for Claude ──
            const severityMap = { 'critical': 'Critical', 'high': 'High', 'medium': 'Medium', 'low': 'Low' };
            const slaMap = { 'critical': '30 days', 'high': '30 days', 'medium': '60 days', 'low': '90 days' };
            const alertSummaries = [];

            for (const alert of alerts) {
              const cve = alert.security_advisory?.cve_id;
              const ghsa = alert.security_advisory?.ghsa_id;
              const id = cve || ghsa || `ALERT-${alert.number}`;
              const severity = alert.security_vulnerability?.severity || 'unknown';
              const pkg = alert.security_vulnerability?.package?.name || 'unknown';
              const ecosystem = alert.security_vulnerability?.package?.ecosystem || 'unknown';
              const vulnRange = alert.security_vulnerability?.vulnerable_version_range || 'unknown';
              const patchedVer = alert.security_vulnerability?.first_patched_version?.identifier || null;
              const summary = alert.security_advisory?.summary || 'No summary';
              const description = alert.security_advisory?.description || '';
              const cvss = alert.security_advisory?.cvss?.score || 'N/A';
              const manifest = alert.dependency?.manifest_path || 'unknown';

              // Create GitHub issue if it doesn't exist yet (syncs to Linear automatically)
              if (!existingIds.includes(cve) && !existingIds.includes(ghsa) && !existingIds.includes(id)) {
                const sevLabel = `Severity: ${severityMap[severity] || 'Low'}`;
                const sla = slaMap[severity] || '90 days';
                try {
                  await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: `[${severity.toUpperCase()}] ${id}: ${summary.substring(0, 80)}`,
                    body: [
                      `## Vulnerability Details`,
                      `| Field | Value |`,
                      `|-------|-------|`,
                      `| **Identifier** | ${id} |`,
                      `| **Severity** | ${severity.toUpperCase()} |`,
                      `| **CVSS** | ${cvss} |`,
                      `| **SLA** | ${sla} |`,
                      `| **Package** | ${pkg} (${ecosystem}) |`,
                      `| **Vulnerable** | ${vulnRange} |`,
                      `| **Patched** | ${patchedVer || 'No fix available'} |`,
                      `| **Manifest** | \`${manifest}\` |`,
                      ``,
                      `## Summary`,
                      summary,
                      ``,
                      `## Description`,
                      description.substring(0, 2000),
                      ``,
                      `---`,
                      `*Auto-generated by vuln-autofix on ${new Date().toISOString().split('T')[0]}*`,
                      `*This issue will sync to Linear for triage and remediation tracking.*`
                    ].join('\n'),
                    labels: ['Source: Vulnerability Scan', 'Flag: security', 'Repo: elnora-mcp-server', sevLabel]
                  });
                  console.log(`Created issue for ${id}`);
                  existingIds.push(id);
                } catch (e) {
                  console.error(`Failed to create issue for ${id}: ${e.message}`);
                }
              }

              // Build summary object for Claude prompt
              alertSummaries.push({
                id, severity, pkg, ecosystem, vulnRange, patchedVer, summary,
                manifest, cvss,
                description: description.substring(0, 500)
              });
            }

            // ── Check if there's an existing open auto-fix PR ──
            // If a fix PR already exists, skip Claude to avoid duplicate work and API cost
            const { data: openPRs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            const hasExistingFixPR = openPRs.some(pr =>
              pr.head.ref.startsWith('fix/vuln-remediation-')
            );
            if (hasExistingFixPR) {
              console.log('An open vuln-remediation PR already exists — skipping Claude to avoid duplicates');
              core.setOutput('has_alerts', 'false');
              return;
            }

            // Write alert data for Claude to read
            const fs = require('fs');
            fs.writeFileSync('/tmp/vuln-alerts.json', JSON.stringify(alertSummaries, null, 2));
            core.setOutput('has_alerts', 'true');
            core.setOutput('alert_count', String(alertSummaries.length));
            console.log(`Wrote ${alertSummaries.length} alerts to /tmp/vuln-alerts.json`);

      - name: Claude Code Auto-Fix
        if: steps.alerts.outputs.has_alerts == 'true' && github.event.inputs.dry_run != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are an automated vulnerability remediation agent for the Elnora
            MCP Server (a TypeScript/Node.js project using Express, MCP SDK, axios).

            ## Your Task

            Read /tmp/vuln-alerts.json which contains open Dependabot vulnerability
            alerts. For each alert, determine the best remediation and apply it.

            ## Decision Framework

            For each vulnerability:

            1. **Fix available (patch/minor version bump)**:
               - Apply the fix via `npm install <package>@<version>` or by updating
                 the version in package.json (direct dep) or adding to "overrides"
                 (transitive dep).
               - These are safe to apply.

            2. **Fix available (major version bump)**:
               - Check the package changelog/release notes for breaking changes.
               - If the package is a devDependency (only used in tests/build), apply it.
               - If it's a production dependency, check if our code uses any APIs that
                 changed. Apply if safe, skip if breaking.
               - Note any skipped major bumps in your report.

            3. **No fix available**:
               - Do NOT modify any code for these.
               - Note them in your report as "no fix available — risk acceptance candidate".
               - Include a brief explanation of why the risk is acceptable (e.g., the
                 vulnerable code path is not reachable in our deployment).

            ## Steps

            1. Read /tmp/vuln-alerts.json
            2. Read package.json to understand current dependency versions and overrides
            3. For each fixable alert:
               a. Apply the fix (update package.json or overrides)
               b. Run `npm install` to update the lockfile
               c. Run `npm test` to verify nothing breaks
               d. If tests fail, revert that specific change and note it as "fix broke tests"
            4. After all fixes are applied, run `npm audit` to verify remaining status
            5. Create a single branch and PR with all fixes:
               - Branch: `fix/vuln-remediation-<date>` (use today's date, e.g., fix/vuln-remediation-2026-04-08)
               - PR title: `fix(deps): automated vulnerability remediation <date>`
               - PR body must include:

                 ## Vulnerabilities Fixed
                 | CVE/GHSA | Package | Old Version | New Version | Type |
                 |----------|---------|-------------|-------------|------|
                 (table of all fixed vulns)

                 ## Vulnerabilities Skipped
                 | CVE/GHSA | Package | Reason |
                 |----------|---------|--------|
                 (table of skipped vulns with reasons)

                 ## Risk Assessment
                 - For each fix: brief note on safety (patch/minor, tests pass, etc.)
                 - Overall assessment: "ready-to-merge" or "needs-review"

                 ## Test Results
                 - Paste the test output summary

               - Add label `security` to the PR
            6. If there are no fixable alerts (all are no-fix-available), do NOT create
               a PR. Instead, just output a summary of what was found.

            ## Important Rules

            - Do NOT modify any code beyond package.json, package-lock.json, and
              overrides. This is dependency management only.
            - Do NOT add comments to code files.
            - Do NOT skip running tests. Tests MUST pass before creating the PR.
            - If `npm install` fails, try `npm install --legacy-peer-deps` as fallback.
            - Use `gh pr create` to create the PR (gh CLI is available).
            - The PR description must be clear enough for a human reviewer to
              understand what changed and why, and to make a merge decision quickly.
          claude_args: |
            --model claude-sonnet-4-6-20250514
            --max-turns 60
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash(npm:*),Bash(npx:*),Bash(node:*),Bash(git:*),Bash(gh:*),Bash(cat:*),Bash(echo:*)"
